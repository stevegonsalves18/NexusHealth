name: Weekly PySpark ETL & ML Retraining

on:
  schedule:
    # Trigger weekly on Sundays at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    # Allow manual execution via the Actions tab

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Java JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyspark delta-spark numpy pandas scikit-learn xgboost joblib requests sqlalchemy psycopg2-binary pyarrow huggingface_hub

    - name: Run PySpark ETL and Model Retraining
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        BACKEND_URL: ${{ secrets.BACKEND_URL }}
        ADMIN_JWT_TOKEN: ${{ secrets.ADMIN_JWT_TOKEN }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_DATASET_ID: ${{ secrets.HF_DATASET_ID }}
      run: |
        python scripts/runners/run_spark_etl.py
