# Stale issue/PR bot — auto-labels and closes inactive issues
# FREE via GitHub Actions
name: "Stale Issues"

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # Issues
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this is still relevant, please comment or remove the `stale` label.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no activity.
            Feel free to reopen if this is still relevant.
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: "stale"
          exempt-issue-labels: "priority: critical,priority: high,in-progress,blocked,security,hipaa"

          # PRs
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: "stale"
          exempt-pr-labels: "in-progress,blocked"
