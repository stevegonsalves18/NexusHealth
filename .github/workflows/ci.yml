name: AIO Healthcare CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: "dummy_key_for_testing"
      SECRET_KEY: "test_secret_key_for_ci_only"
      TESTING: "true"

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: npm --prefix frontend ci

    - name: Lint React Frontend
      run: npm --prefix frontend run lint

    - name: Build React Frontend
      run: npm --prefix frontend run build

    - name: Check agent adapter sync
      run: python scripts/sync_agent_adapters.py --check
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt
        pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt
        
    - name: Lint Python Code with Ruff
      run: python -m ruff check backend/

    - name: Install Playwright Browsers
      run: |
        npx --prefix frontend playwright install chromium --with-deps
        playwright install chromium

    - name: Generate Placeholder Models
      run: python scripts/generate_placeholder_models.py
        
    - name: Start Backend in Background
      env:
        DATABASE_URL: "sqlite:///healthcare_test.db"
      run: |
        nohup uvicorn backend.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &

    - name: Wait for Servers
      run: |
        python scripts/wait_for_server.py http://127.0.0.1:8000 || (echo "Backend failed; log:" && tail -n 100 /tmp/uvicorn.log && exit 1)

    - name: Run Backend Tests (Unit, Integration)
      run: |
        pytest tests/ --ignore=tests/e2e --cov=backend --cov-report=term-missing

    - name: Run Frontend Unit Tests with Coverage
      working-directory: frontend
      run: npm run test -- --coverage

    - name: Run Frontend E2E Playwright Tests
      working-directory: frontend
      run: npm run test:e2e

