name: Daily Clinical Audit Agent

on:
  schedule:
    # Trigger daily at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    # Allow manual execution via the Actions tab
    inputs:
      hours:
        description: 'Timeframe scope in hours to audit'
        required: true
        default: '24'
      dry_run:
        description: 'Dry run (mock AI responses)'
        type: boolean
        required: false
        default: false

jobs:
  audit:
    name: Run Clinical Audit Agent
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install database, API and model loading dependencies
        pip install requests sqlalchemy python-dotenv httpx pydantic joblib pandas scikit-learn

    - name: Run Clinical Audit Agent
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        OLLAMA_BASE_URL: "http://127.0.0.1:11434"
      run: |
        # Parse inputs for manual run, fallback to defaults for cron schedule
        HOURS="${{ github.event.inputs.hours || '24' }}"
        DRY_RUN=""
        if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
          DRY_RUN="--dry-run"
        fi
        
        python scripts/runners/run_clinical_agent.py --hours "$HOURS" $DRY_RUN

    - name: Upload Audit Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: clinical-audit-report
        path: output/clinical_audits/
