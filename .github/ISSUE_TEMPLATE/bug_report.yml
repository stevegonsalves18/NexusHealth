name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - stevegonsalves18
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Backend API
        - Frontend (React/Vite)
        - ML Models / Predictions
        - AI Chat / RAG
        - Authentication
        - PDF Reports
        - Docker / Deployment
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: "When I click X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages.
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - 🔴 Critical — System down / data loss
        - 🟠 High — Major feature broken
        - 🟡 Medium — Minor feature broken
        - 🟢 Low — Cosmetic / nice-to-have
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, browser, Python version, etc.
      placeholder: |
        - OS: Windows 11
        - Browser: Chrome 120
        - Python: 3.10
        - Node: 18.x
