[pytest]
asyncio_mode = auto
markers =
    e2e: End-to-End UI tests using Playwright
    asyncio: Asyncio tests
testpaths = tests
python_files = test_*.py
addopts = -n auto -v --strict-markers --cov=backend --cov-report=term --cov-report=html --cov-fail-under=55
filterwarnings =
    ignore::FutureWarning
    ignore::DeprecationWarning:fastapi
