# =======================================================
# pgBouncer Configuration for NexusHealth
# =======================================================

[databases]
# Format: dbname = host=HOST port=PORT dbname=DBNAME
healthcare_db = host=postgres port=5432 dbname=healthcare_db

[pgbouncer]
logfile = /var/log/postgresql/pgbouncer.log
pidfile = /var/run/postgresql/pgbouncer.pid

# Connection details
listen_addr = *
listen_port = 6432

# Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

# Pooling mode: transaction mode allows sharing connections between client requests
pool_mode = transaction

# Connection limits
max_client_conn = 500
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 5
max_db_connections = 100

# Performance tweaks
query_timeout = 30
client_idle_timeout = 120
connection_lifetime = 600
