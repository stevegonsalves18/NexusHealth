# ============================================================
# NexusHealth — Docker Compose
# ============================================================
# Usage:
#   docker compose up --build        (start all services)
#   docker compose up backend        (backend only)
#   docker compose down              (stop all)
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./healthcare.db:/app/healthcare.db
      - ./backend:/app/backend
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
        - VITE_PUBLIC_API_URL=http://127.0.0.1:8000
    container_name: healthcare_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
      - VITE_PUBLIC_API_URL=http://127.0.0.1:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
