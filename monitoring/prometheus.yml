global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'healthcare-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'flask_.*'
        target_label: service
        replacement: 'backend'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'pg_.*'
        target_label: service
        replacement: 'database'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'redis_.*'
        target_label: service
        replacement: 'cache'

  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'system'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
